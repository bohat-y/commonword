version: 2.1

executors:
  dotnet-executor:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:10.0
    working_directory: ~/project
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

  node-executor:
    docker:
      - image: cimg/node:20.19
    working_directory: ~/project

  rust-executor:
    docker:
      - image: rust:1.87-bookworm
    working_directory: ~/project

commands:
  enable-pnpm:
    steps:
      - run:
          name: Enable pnpm
          command: |
            corepack enable
            corepack prepare pnpm@9.12.3 --activate
            pnpm config set store-dir ~/.pnpm-store

jobs:
  backend-quality:
    executor: dotnet-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
            - nuget-v1-
      - run:
          name: Restore backend dependencies
          command: dotnet restore backend/Commonword.sln
      - save_cache:
          key: nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
          paths:
            - ~/.nuget/packages
      - run:
          name: Build backend
          command: dotnet build backend/Commonword.sln -c Release --no-restore
      - run:
          name: Run backend tests
          command: |
            mkdir -p /tmp/test-results/dotnet
            dotnet test backend/Commonword.sln \
              -c Release \
              --no-restore \
              --logger "trx;LogFileName=commonword.trx" \
              --results-directory /tmp/test-results/dotnet
      - store_test_results:
          path: /tmp/test-results/dotnet
      - store_artifacts:
          path: /tmp/test-results/dotnet
          destination: backend-test-results

  backend-security:
    executor: dotnet-executor
    steps:
      - checkout
      - run:
          name: Install jq
          command: |
            apt-get update
            apt-get install -y jq
      - restore_cache:
          keys:
            - nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
            - nuget-v1-
      - run:
          name: Audit NuGet packages
          command: |
            dotnet package list \
              --project backend/Commonword.sln \
              --include-transitive \
              --vulnerable \
              --format json \
              > /tmp/backend-vulnerabilities.json

            if jq -e '[.. | objects | select(has("vulnerabilities")) | select(.vulnerabilities | length > 0)] | length == 0' /tmp/backend-vulnerabilities.json >/dev/null; then
              echo "No known vulnerable NuGet packages were reported."
              exit 0
            fi

            echo "Vulnerable NuGet packages were found:"
            jq '[.. | objects | select(has("id") and has("vulnerabilities")) | select(.vulnerabilities | length > 0)]' /tmp/backend-vulnerabilities.json
            exit 1
      - store_artifacts:
          path: /tmp/backend-vulnerabilities.json
          destination: backend-security

  clients-quality:
    executor: node-executor
    environment:
      VITE_API_BASE_URL: https://api.example.invalid
    steps:
      - checkout
      - enable-pnpm
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install workspace dependencies
          command: pnpm install --dir clients --frozen-lockfile
      - save_cache:
          key: pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
      - run:
          name: Build web app
          command: pnpm -C clients/apps/web build
      - run:
          name: Build Tauri web shell
          command: pnpm -C clients/apps/tauri build

  clients-security:
    executor: node-executor
    steps:
      - checkout
      - enable-pnpm
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install workspace dependencies
          command: pnpm install --dir clients --frozen-lockfile
      - run:
          name: Audit JavaScript dependencies
          command: |
            cd clients
            pnpm audit --audit-level high

  tauri-security:
    executor: rust-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-audit-v1-{{ arch }}-0.22.1
            - cargo-audit-v1-
      - run:
          name: Install cargo-audit
          command: |
            if ! command -v cargo-audit >/dev/null 2>&1; then
              cargo install cargo-audit --locked
            fi
      - save_cache:
          key: cargo-audit-v1-{{ arch }}-0.22.1
          paths:
            - ~/.cargo/bin
            - ~/.cargo/advisory-db
            - ~/.cargo/git
            - ~/.cargo/registry
      - run:
          name: Audit Rust dependencies
          command: cargo audit --file clients/apps/tauri/src-tauri/Cargo.lock

  android-quality:
    machine:
      image: android:2024.11.1
    resource_class: medium
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "clients/apps/android-native/gradle/libs.versions.toml" }}-{{ checksum "clients/apps/android-native/gradle/wrapper/gradle-wrapper.properties" }}
            - gradle-v1-
      - run:
          name: Install Android SDK 36 packages
          command: |
            yes | sdkmanager --licenses >/dev/null || true
            sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - run:
          name: Run Android unit tests and JaCoCo
          command: |
            cd clients/apps/android-native
            ./gradlew --no-daemon testDebugUnitTest
      - save_cache:
          key: gradle-v1-{{ checksum "clients/apps/android-native/gradle/libs.versions.toml" }}-{{ checksum "clients/apps/android-native/gradle/wrapper/gradle-wrapper.properties" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
      - store_test_results:
          path: clients/apps/android-native/app/build/test-results/testDebugUnitTest

workflows:
  ci:
    jobs:
      - backend-quality
      - backend-security
      - clients-quality
      - clients-security
      - android-quality

  extended-security:
    jobs:
      - tauri-security:
          filters:
            branches:
              only:
                - main
