version: 2.1

executors:
  dotnet-executor:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:10.0
    working_directory: ~/project
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

  node-executor:
    docker:
      - image: cimg/node:20.19
    working_directory: ~/project

commands:
  enable-pnpm:
    steps:
      - run:
          name: Enable pnpm
          command: |
            corepack enable
            corepack prepare pnpm@9.12.3 --activate
            pnpm config set store-dir ~/.pnpm-store

jobs:
  backend-quality:
    executor: dotnet-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
            - nuget-v1-
      - run:
          name: Restore backend dependencies
          command: dotnet restore backend/Commonword.sln
      - save_cache:
          key: nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
          paths:
            - ~/.nuget/packages
      - run:
          name: Build backend
          command: dotnet build backend/Commonword.sln -c Release --no-restore
      - run:
          name: Run backend tests
          command: |
            mkdir -p /tmp/test-results/dotnet
            dotnet test backend/Commonword.sln \
              -c Release \
              --no-restore \
              --logger "trx;LogFileName=commonword.trx" \
              --results-directory /tmp/test-results/dotnet
      - store_test_results:
          path: /tmp/test-results/dotnet
      - store_artifacts:
          path: /tmp/test-results/dotnet
          destination: backend-test-results

  backend-security:
    executor: dotnet-executor
    steps:
      - checkout
      - run:
          name: Install jq
          command: |
            apt-get update
            apt-get install -y jq
      - restore_cache:
          keys:
            - nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
            - nuget-v1-
      - run:
          name: Audit NuGet packages
          command: |
            dotnet package list \
              --project backend/Commonword.sln \
              --include-transitive \
              --vulnerable \
              --format json \
              > /tmp/backend-vulnerabilities.json

            if jq -e '[.. | objects | select(has("vulnerabilities")) | select(.vulnerabilities | length > 0)] | length == 0' /tmp/backend-vulnerabilities.json >/dev/null; then
              echo "No known vulnerable NuGet packages were reported."
              exit 0
            fi

            echo "Vulnerable NuGet packages were found:"
            jq '[.. | objects | select(has("id") and has("vulnerabilities")) | select(.vulnerabilities | length > 0)]' /tmp/backend-vulnerabilities.json
            exit 1
      - store_artifacts:
          path: /tmp/backend-vulnerabilities.json
          destination: backend-security

  clients-quality:
    executor: node-executor
    environment:
      VITE_API_BASE_URL: https://api.example.invalid
    steps:
      - checkout
      - enable-pnpm
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install workspace dependencies
          command: pnpm install --dir clients --frozen-lockfile
      - save_cache:
          key: pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
      - run:
          name: Build web app
          command: pnpm -C clients/apps/web build
      - run:
          name: Build Tauri web shell
          command: pnpm -C clients/apps/tauri build

  clients-security:
    executor: node-executor
    steps:
      - checkout
      - enable-pnpm
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install workspace dependencies
          command: pnpm install --dir clients --frozen-lockfile
      - run:
          name: Audit JavaScript dependencies
          command: |
            cd clients
            pnpm audit --audit-level high

workflows:
  ci:
    jobs:
      - backend-quality
      - backend-security
      - clients-quality
      - clients-security
