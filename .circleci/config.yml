version: 2.1

executors:
  dotnet-executor:
    docker:
      - image: mcr.microsoft.com/dotnet/sdk:10.0
    working_directory: ~/project
    environment:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"

  node-executor:
    docker:
      - image: cimg/node:20.19
    working_directory: ~/project

  rust-executor:
    docker:
      - image: rust:1.87-bookworm
    working_directory: ~/project

  base-executor:
    docker:
      - image: cimg/base:stable
    working_directory: ~/project

commands:
  enable-pnpm:
    steps:
      - run:
          name: Enable pnpm
          command: |
            corepack enable
            corepack prepare pnpm@9.12.3 --activate
            pnpm config set store-dir ~/.pnpm-store

jobs:
  backend-quality:
    executor: dotnet-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
            - nuget-v1-
      - run:
          name: Restore backend dependencies
          command: dotnet restore backend/Commonword.sln
      - save_cache:
          key: nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
          paths:
            - ~/.nuget/packages
      - run:
          name: Build backend
          command: dotnet build backend/Commonword.sln -c Release --no-restore
      - run:
          name: Run backend tests
          command: |
            mkdir -p /tmp/test-results/dotnet
            dotnet test backend/Commonword.sln \
              -c Release \
              --no-restore \
              --logger "trx;LogFilePrefix=commonword" \
              --results-directory /tmp/test-results/dotnet
      - store_test_results:
          path: /tmp/test-results/dotnet
      - store_artifacts:
          path: /tmp/test-results/dotnet
          destination: backend-test-results

  backend-security:
    executor: dotnet-executor
    steps:
      - checkout
      - run:
          name: Install jq
          command: |
            apt-get update
            apt-get install -y jq
      - restore_cache:
          keys:
            - nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
            - nuget-v1-
      - run:
          name: Audit NuGet packages
          command: |
            dotnet package list \
              --project backend/Commonword.sln \
              --include-transitive \
              --vulnerable \
              --format json \
              > /tmp/backend-vulnerabilities.json

            if jq -e '[.. | objects | select(has("vulnerabilities")) | select(.vulnerabilities | length > 0)] | length == 0' /tmp/backend-vulnerabilities.json >/dev/null; then
              echo "No known vulnerable NuGet packages were reported."
              exit 0
            fi

            echo "Vulnerable NuGet packages were found:"
            jq '[.. | objects | select(has("id") and has("vulnerabilities")) | select(.vulnerabilities | length > 0)]' /tmp/backend-vulnerabilities.json
            exit 1
      - store_artifacts:
          path: /tmp/backend-vulnerabilities.json
          destination: backend-security

  backend-coverage:
    executor: dotnet-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
            - nuget-v1-
      - run:
          name: Restore backend dependencies
          command: dotnet restore backend/Commonword.sln
      - save_cache:
          key: nuget-v1-{{ checksum "backend/Directory.Packages.props" }}-{{ checksum "backend/Commonword.sln" }}
          paths:
            - ~/.nuget/packages
      - run:
          name: Generate backend Cobertura coverage
          command: |
            rm -rf /tmp/backend-coverage
            mkdir -p /tmp/backend-coverage/test-results /tmp/backend-coverage/trx /tmp/backend-coverage/cobertura
            dotnet test backend/Commonword.sln \
              -c Release \
              --no-restore \
              --logger "trx;LogFilePrefix=coverage" \
              --results-directory /tmp/backend-coverage/test-results \
              --collect:"XPlat Code Coverage;Format=cobertura"

            find /tmp/backend-coverage/test-results -name '*.trx' | while read -r file; do
              cp "$file" /tmp/backend-coverage/trx/
            done

            find /tmp/backend-coverage/test-results -name 'coverage.cobertura.xml' | while read -r file; do
              folder="$(basename "$(dirname "$file")")"
              cp "$file" "/tmp/backend-coverage/cobertura/${folder}-coverage.cobertura.xml"
            done
      - store_test_results:
          path: /tmp/backend-coverage/trx
      - store_artifacts:
          path: /tmp/backend-coverage
          destination: backend-coverage

  clients-quality:
    executor: node-executor
    environment:
      VITE_API_BASE_URL: https://api.example.invalid
    steps:
      - checkout
      - enable-pnpm
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install workspace dependencies
          command: pnpm install --dir clients --frozen-lockfile
      - save_cache:
          key: pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
      - run:
          name: Build web app
          command: pnpm -C clients/apps/web build
      - run:
          name: Build Tauri web shell
          command: pnpm -C clients/apps/tauri build

  clients-security:
    executor: node-executor
    steps:
      - checkout
      - enable-pnpm
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install workspace dependencies
          command: pnpm install --dir clients --frozen-lockfile
      - run:
          name: Audit JavaScript dependencies
          command: |
            cd clients
            pnpm audit --audit-level high

  tauri-security:
    executor: rust-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-audit-v1-{{ arch }}-0.22.1
            - cargo-audit-v1-
      - run:
          name: Install cargo-audit
          command: |
            if ! command -v cargo-audit >/dev/null 2>&1; then
              cargo install cargo-audit --locked
            fi
      - save_cache:
          key: cargo-audit-v1-{{ arch }}-0.22.1
          paths:
            - ~/.cargo/bin
            - ~/.cargo/advisory-db
            - ~/.cargo/git
            - ~/.cargo/registry
      - run:
          name: Audit Rust dependencies
          command: cargo audit --file clients/apps/tauri/src-tauri/Cargo.lock

  android-quality:
    machine:
      image: android:2024.11.1
    resource_class: medium
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "clients/apps/android-native/gradle/libs.versions.toml" }}-{{ checksum "clients/apps/android-native/gradle/wrapper/gradle-wrapper.properties" }}
            - gradle-v1-
      - run:
          name: Install Android SDK 36 packages
          command: |
            yes | sdkmanager --licenses >/dev/null || true
            sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - run:
          name: Run Android unit tests and JaCoCo
          command: |
            cd clients/apps/android-native
            ./gradlew --no-daemon testDebugUnitTest
      - save_cache:
          key: gradle-v1-{{ checksum "clients/apps/android-native/gradle/libs.versions.toml" }}-{{ checksum "clients/apps/android-native/gradle/wrapper/gradle-wrapper.properties" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
      - store_test_results:
          path: clients/apps/android-native/app/build/test-results/testDebugUnitTest

  android-reports:
    machine:
      image: android:2024.11.1
    resource_class: medium
    working_directory: ~/project
    steps:
      - checkout
      - restore_cache:
          keys:
            - gradle-v1-{{ checksum "clients/apps/android-native/gradle/libs.versions.toml" }}-{{ checksum "clients/apps/android-native/gradle/wrapper/gradle-wrapper.properties" }}
            - gradle-v1-
      - run:
          name: Install Android SDK 36 packages
          command: |
            yes | sdkmanager --licenses >/dev/null || true
            sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - run:
          name: Generate Android lint and JaCoCo reports
          command: |
            cd clients/apps/android-native
            ./gradlew --no-daemon lintDebug jacocoTestReport
      - save_cache:
          key: gradle-v1-{{ checksum "clients/apps/android-native/gradle/libs.versions.toml" }}-{{ checksum "clients/apps/android-native/gradle/wrapper/gradle-wrapper.properties" }}
          paths:
            - ~/.gradle/caches
            - ~/.gradle/wrapper
      - store_test_results:
          path: clients/apps/android-native/app/build/test-results/testDebugUnitTest
      - store_artifacts:
          path: clients/apps/android-native/app/build/reports
          destination: android-quality-reports

  frontend-reports:
    executor: node-executor
    environment:
      VITE_API_BASE_URL: https://api.example.invalid
    steps:
      - checkout
      - enable-pnpm
      - restore_cache:
          keys:
            - pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
            - pnpm-v1-
      - run:
          name: Install workspace dependencies
          command: pnpm install --dir clients --frozen-lockfile
      - save_cache:
          key: pnpm-v1-{{ checksum "clients/pnpm-lock.yaml" }}
          paths:
            - ~/.pnpm-store
      - run:
          name: Generate ESLint report
          command: pnpm -C clients lint:report
      - run:
          name: Generate Vitest coverage report
          command: pnpm -C clients test:coverage:web
      - store_artifacts:
          path: clients/reports/eslint
          destination: frontend-eslint
      - store_artifacts:
          path: clients/packages/ui-core/coverage
          destination: frontend-coverage

  publish-api-image:
    executor: base-executor
    steps:
      - checkout
      - setup_remote_docker
      - run:
          name: Resolve GHCR image metadata
          command: |
            if [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
              echo "GHCR_USERNAME and GHCR_TOKEN must be set to publish the API image."
              exit 1
            fi

            ghcr_namespace="${GHCR_NAMESPACE:-$GHCR_USERNAME}"
            ghcr_namespace="$(printf '%s' "$ghcr_namespace" | tr '[:upper:]' '[:lower:]')"

            echo "export GHCR_IMAGE_REPO=ghcr.io/${ghcr_namespace}/commonword-api" >> "$BASH_ENV"
            echo "export GHCR_IMAGE_TAG=sha-${CIRCLE_SHA1}" >> "$BASH_ENV"
      - run:
          name: Log in to GHCR
          command: |
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      - run:
          name: Build API Docker image
          command: |
            docker build \
              -f backend/Dockerfile \
              -t "${GHCR_IMAGE_REPO}:${GHCR_IMAGE_TAG}" \
              -t "${GHCR_IMAGE_REPO}:latest" \
              backend
      - run:
          name: Push API Docker image
          command: |
            docker push "${GHCR_IMAGE_REPO}:${GHCR_IMAGE_TAG}"
            docker push "${GHCR_IMAGE_REPO}:latest"
      - run:
          name: Write image metadata
          command: |
            mkdir -p /tmp/api-image
            {
              echo "repository=${GHCR_IMAGE_REPO}"
              echo "sha_tag=${GHCR_IMAGE_TAG}"
              echo "latest_tag=latest"
            } > /tmp/api-image/metadata.txt
      - store_artifacts:
          path: /tmp/api-image
          destination: api-image

  deploy-api:
    executor: base-executor
    steps:
      - checkout
      - run:
          name: Install deploy tooling
          command: |
            sudo apt-get update
            sudo apt-get install -y jq wget

            mkdir -p ~/bin
            wget -q https://github.com/digitalocean/doctl/releases/download/v1.154.0/doctl-1.154.0-linux-amd64.tar.gz -O /tmp/doctl.tar.gz
            tar -xzf /tmp/doctl.tar.gz -C /tmp
            mv /tmp/doctl ~/bin/doctl
            chmod +x ~/bin/doctl
            echo 'export PATH="$HOME/bin:$PATH"' >> "$BASH_ENV"
      - run:
          name: Resolve deploy variables
          command: |
            do_token="${DIGITALOCEAN_ACCESS_TOKEN_COMMONWORD:-${DIGITALOCEAN_ACCESS_TOKEN_COMMONWOR:-}}"
            if [ -z "$do_token" ]; then
              echo "DIGITALOCEAN_ACCESS_TOKEN_COMMONWORD must be set in the commonword-api-deploy context."
              exit 1
            fi

            if [ -z "${DO_APP_ID:-}" ]; then
              echo "DO_APP_ID must be set in the commonword-api-deploy context."
              exit 1
            fi

            ghcr_namespace="${GHCR_NAMESPACE:-$GHCR_USERNAME}"
            ghcr_namespace="$(printf '%s' "$ghcr_namespace" | tr '[:upper:]' '[:lower:]')"

            echo "export DO_ACCESS_TOKEN=$do_token" >> "$BASH_ENV"
            echo "export GHCR_IMAGE_REGISTRY=$ghcr_namespace" >> "$BASH_ENV"
            echo "export GHCR_IMAGE_REPOSITORY=commonword-api" >> "$BASH_ENV"
            echo "export GHCR_IMAGE_TAG=sha-${CIRCLE_SHA1}" >> "$BASH_ENV"
      - run:
          name: Patch app spec to the new API image tag
          command: |
            doctl apps spec get "$DO_APP_ID" --format json --access-token "$DO_ACCESS_TOKEN" > /tmp/app-spec.json

            match_count="$(jq -r \
              --arg registry "$GHCR_IMAGE_REGISTRY" \
              --arg repository "$GHCR_IMAGE_REPOSITORY" \
              '[.services[]? | select(.image.registry_type == "GHCR" and .image.registry == $registry and .image.repository == $repository)] | length' \
              /tmp/app-spec.json)"

            if [ "$match_count" = "0" ]; then
              echo "Could not find a GHCR service for ${GHCR_IMAGE_REGISTRY}/${GHCR_IMAGE_REPOSITORY} in the current app spec."
              exit 1
            fi

            jq \
              --arg registry "$GHCR_IMAGE_REGISTRY" \
              --arg repository "$GHCR_IMAGE_REPOSITORY" \
              --arg tag "$GHCR_IMAGE_TAG" \
              '(.services[]? | select(.image.registry_type == "GHCR" and .image.registry == $registry and .image.repository == $repository) | .image.tag) = $tag' \
              /tmp/app-spec.json > /tmp/app-spec.patched.json
      - run:
          name: Deploy API on App Platform
          command: |
            doctl apps update "$DO_APP_ID" \
              --spec /tmp/app-spec.patched.json \
              --wait \
              --access-token "$DO_ACCESS_TOKEN"
      - run:
          name: Write deployment metadata
          command: |
            mkdir -p /tmp/api-deploy
            {
              echo "app_id=${DO_APP_ID}"
              echo "registry=${GHCR_IMAGE_REGISTRY}"
              echo "repository=${GHCR_IMAGE_REPOSITORY}"
              echo "tag=${GHCR_IMAGE_TAG}"
            } > /tmp/api-deploy/metadata.txt
      - store_artifacts:
          path: /tmp/api-deploy
          destination: api-deploy

workflows:
  api-ci:
    jobs:
      - backend-quality
      - backend-security
      - publish-api-image:
          context:
            - commonword-api-deploy
          requires:
            - backend-quality
            - backend-security
          filters:
            branches:
              only:
                - main
      - deploy-api:
          context:
            - commonword-api-deploy
          requires:
            - publish-api-image
          filters:
            branches:
              only:
                - main

  clients-ci:
    jobs:
      - clients-quality
      - clients-security
      - android-quality

  extended-security:
    jobs:
      - tauri-security:
          filters:
            branches:
              only:
                - main

  api-reports:
    jobs:
      - backend-coverage:
          filters:
            branches:
              only:
                - main

  clients-reports:
    jobs:
      - frontend-reports:
          filters:
            branches:
              only:
                - main
      - android-reports:
          filters:
            branches:
              only:
                - main
